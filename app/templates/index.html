<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسعد المالكي | Maliki AI Scholar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 (Free) for real icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Noto+Kufi+Arabic:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { 
            font-family: 'Noto Kufi Arabic', sans-serif; 
            background: #0A0F0C; /* deep dark base - almost black with slight green undertone */
        }
        
        /* refined dark palette */
        .bg-dark-primary { background-color: #0C120E; } /* deepest background */
        .bg-dark-surface { background-color: #151E1A; } /* cards/surfaces */
        .bg-dark-elevated { background-color: #1E2A24; } /* elevated surfaces */
        
        .gold-primary { color: #D4AF37; } /* rich gold */
        .gold-muted { color: #B8943C; } /* muted gold */
        .gold-dim { color: #9E7B2C; } /* dim gold for accents */
        
        .border-gold-subtle { border-color: rgba(212, 175, 55, 0.25); }
        .border-gold-medium { border-color: rgba(212, 175, 55, 0.45); }
        
        .scholarly-bg { 
            background: linear-gradient(145deg, #0A0F0C 0%, #0C1510 100%);
        }
        
        .primary-border { border-color: #D4AF37; }
        .gold-text { color: #D4AF37; }
        
        .glass-panel { 
            background: rgba(20, 35, 25, 0.65); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.8);
            transition: all 0.25s ease;
        }
        
        .glass-panel:hover {
            border-color: rgba(212, 175, 55, 0.35);
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.95);
        }
        
        .ai-scholarly-card {
            background: linear-gradient(165deg, #1C2B22 0%, #142118 100%);
            border-right: 4px solid #D4AF37;
            border-radius: 1.2rem;
            padding: 1.5rem;
            color: #E8EED9;
            line-height: 1.8;
            font-size: 1rem;
            box-shadow: 0 15px 30px -10px rgba(0, 0, 0, 0.9);
        }
        
        /* custom scrollbar - dark & gold */
        #chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        #chat-container::-webkit-scrollbar-track {
            background: #1E2A24;
            border-radius: 10px;
        }
        
        #chat-container::-webkit-scrollbar-thumb {
            background: #D4AF37;
            border-radius: 10px;
            border: 1px solid #2A3A30;
        }
        
        .message-transition {
            animation: fadeSlide 0.3s ease-out;
        }
        
        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fa-icon-custom {
            filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.7));
        }
        
        .input-glow:focus {
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.2), 0 0 20px rgba(212, 175, 55, 0.15);
            border-color: #D4AF37;
        }
        
        /* perfect dark green but not overpowering */
        .dark-green-gradient {
            background: linear-gradient(180deg, #1A2A20 0%, #0F1A13 100%);
        }
        
        .input-dark {
            background-color: #1A2620;
            border-color: #3A4A40;
            color: #E8EED9;
        }
        
        .input-dark::placeholder {
            color: #6A7A70;
        }
        
        .input-dark:focus {
            background-color: #1F3026;
            border-color: #D4AF37;
        }

        /* Markdown Styling inside AI card */
        .markdown-body ul {
            list-style-type: disc;
            margin-right: 1.5rem;
            margin-bottom: 1rem;
        }
        .markdown-body li {
            margin-bottom: 0.5rem;
        }
        .markdown-body p {
            margin-bottom: 1.25rem;
            line-height: 2; /* increased for better Arabic readability */
        }
        .markdown-body strong, .markdown-body b {
            color: #D4AF37;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

    </style>
</head>
<body class="scholarly-bg text-gray-100 h-screen flex flex-col font-arabic overflow-hidden">

    <!-- Header with perfect dark colors, removed powered by div -->
    <header class="px-6 py-4 border-b border-gold-subtle flex justify-between items-center shadow-2xl bg-dark-surface/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <!-- mosque icon with dark & gold -->
            <div class="w-12 h-12 bg-dark-elevated border-2 border-gold-muted rounded-2xl flex items-center justify-center text-2xl shadow-inner">
                <i class="fas fa-mosque gold-primary text-2xl"></i>
            </div>
            <div>
                <h1 class="text-2xl font-bold gold-primary flex items-center gap-2">
                    <i class="fas fa-robot text-gold-muted text-xl"></i>
                    المساعد المالكي
                </h1>
                <p class="text-xs text-emerald-200/70 font-medium flex items-center gap-1">
                    <i class="fas fa-scroll text-gold-dim"></i>
                    Maliki AI · الفقه المالكي · RAG Phase 3
                </p>
            </div>
        </div>
        <!-- refined dark tech badge (replaces hidden div) -->
        <div class="flex items-center gap-2 text-emerald-200/80 text-sm bg-dark-elevated/80 px-4 py-2 rounded-full border border-gold-subtle shadow-lg">
            <i class="fas fa-microchip text-gold-muted"></i>
            <span>Gemini 2.5 Flash · PostgreSQL</span>
            <i class="fas fa-cloud-upload-alt text-xs text-gold-dim"></i>
        </div>
    </header>

    <!-- Main Chat Area - perfect dark background -->
    <main id="chat-container" class="flex-1 overflow-y-auto p-5 md:p-8 space-y-6 bg-gradient-to-b from-dark-primary to-[#0F1712]">
        <!-- Initial Welcome Message with refined dark aesthetic -->
        <div class="flex items-start gap-3 message-transition">
            <div class="w-10 h-10 bg-dark-elevated border border-gold-muted rounded-xl flex items-center justify-center shadow-lg shrink-0">
                <i class="fas fa-gem gold-primary text-lg"></i>
            </div>
            <div class="max-w-2xl glass-panel p-6 rounded-2xl rounded-tr-none shadow-xl leading-relaxed text-emerald-50 border-r-4 border-r-gold-muted bg-dark-surface/60">
                <i class="fas fa-quote-right text-gold-dim/40 float-left text-4xl -mt-2 -ml-2"></i>
                <p class="text-lg flex items-center gap-2"><i class="fas fa-hand-sparkles text-gold-primary"></i> السلام عليكم ورحمة الله وبركاته</p>
                <p class="mt-2 text-emerald-100/80 text-sm flex items-start gap-2">
                    <i class="fas fa-book-open text-gold-muted mt-1"></i>
                    <span>مساعد شرعي متخصص في <span class="gold-primary font-bold">الفقه المالكي</span>. استخرج الأحكام من أمهات الكتب: <span class="text-emerald-200">"مختصر الأخضري"</span>، <span class="text-emerald-200">"الرسالة"</span>، <span class="text-emerald-200">"المدونة"</span>.</span>
                </p>
                <div class="mt-3 flex gap-2 text-xs">
                    <span class="bg-black/40 px-3 py-1 rounded-full flex items-center gap-1 border border-gold-subtle"><i class="fas fa-check-circle text-gold-primary"></i> دقيق</span>
                    <span class="bg-black/40 px-3 py-1 rounded-full flex items-center gap-1 border border-gold-subtle"><i class="fas fa-link text-gold-muted"></i> مصادر موثقة</span>
                </div>
            </div>
        </div>
    </main>

    <!-- Input Box - dark refined -->
    <footer class="p-5 bg-gradient-to-t from-dark-primary via-dark-primary to-transparent border-t border-gold-subtle/30">
        <form id="chat-form" class="max-w-4xl mx-auto relative">
            <div class="absolute right-5 top-1/2 -translate-y-1/2 z-10 text-gold-muted">
                <i class="fas fa-pen-nib text-xl"></i>
            </div>
            <input type="text" id="user-input" 
                placeholder="اكتب مسألتك الفقهية ... (مثال: ما هي نواقض الوضوء عند المالكية؟)" 
                class="w-full input-dark border-2 border-gold-subtle/30 focus:border-gold-primary py-5 px-6 pr-14 rounded-2xl text-lg outline-none transition-all shadow-2xl placeholder-emerald-700/60 text-white input-glow"
                required>
            <button type="submit" 
                class="absolute left-3 top-1/2 -translate-y-1/2 bg-gradient-to-br from-gold-muted to-gold-dim hover:from-gold-primary hover:to-gold-muted text-white w-12 h-12 rounded-xl flex items-center justify-center transition-all transform active:scale-90 shadow-xl border border-gold-primary/30 group">
                <i class="fas fa-paper-plane text-xl group-hover:translate-x-1 transition-transform"></i>
            </button>
            <!-- subtle hint -->
            <div class="absolute left-20 bottom-0 translate-y-full text-xs text-emerald-600/60 flex gap-2 mt-1">
                <i class="fas fa-info-circle text-gold-dim"></i> اسأل عن أي مسألة فقهية مالكية
            </div>
        </form>
    </footer>

    <script>
        const chatForm = document.getElementById('chat-form');
        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');

        // Helper: get appropriate icon
        function getIcon(type, isSource = false) {
            if (type === 'user') return '<i class="fas fa-user-circle text-2xl"></i>';
            if (isSource) return '<i class="fas fa-book text-sm"></i>';
            return '<i class="fas fa-landmark text-xl"></i>';
        }

        function appendMessage(text, type, sources = []) {
            const div = document.createElement('div');
            div.className = `flex items-start gap-3 message-transition ${type === 'user' ? 'justify-end' : ''}`;
            
            // dark theme icons
            const userIcon = `<div class="w-10 h-10 bg-dark-elevated border border-gold-subtle rounded-xl flex items-center justify-center shadow-lg shrink-0"><i class="fas fa-user-astronaut text-gold-muted text-xl"></i></div>`;
            const botIcon = `<div class="w-10 h-10 bg-dark-elevated border border-gold-muted rounded-xl flex items-center justify-center shadow-lg shrink-0"><i class="fas fa-gavel gold-primary text-lg"></i></div>`;
            
            // Render text as Markdown
            let processedText = marked.parse(text);
            
            // Sources with icons - dark style
            let sourceHtml = '';
            if (sources && sources.length > 0) {
                sourceHtml = `<div class="mt-5 pt-3 border-t border-gold-subtle/30">
                    <p class="text-xs gold-primary font-bold mb-3 flex items-center gap-2"><i class="fas fa-list-ul text-gold-dim"></i> المصادر المرجعية:</p>
                    <div class="flex flex-wrap gap-2">
                        ${sources.map(s => `
                            <span class="px-3 py-1.5 bg-dark-elevated/80 rounded-lg text-[11px] text-emerald-200 flex items-center gap-2 border border-gold-subtle/30">
                                <i class="fas fa-book-open text-gold-muted"></i>
                                ${s.book || 'مخطوطة'} (ص ${s.page || '--'})
                                ${s.volume ? `<span class="flex items-center gap-1 mr-1"><i class="fas fa-layer-group text-gold-dim"></i> ج${s.volume}</span>` : ''}
                            </span>
                        `).join('')}
                    </div>
                </div>`;
            }

            if (type === 'user') {
                div.innerHTML = `
                    <div class="max-w-[85%] md:max-w-2xl glass-panel p-5 rounded-2xl rounded-tl-none bg-dark-elevated/60 border-l-4 border-l-gold-muted text-white shadow-2xl">
                        <div class="flex items-center gap-2 mb-1 text-gold-muted text-xs"><i class="fas fa-user"></i> سؤالك</div>
                        <p class="leading-relaxed text-emerald-50">${text}</p>
                    </div>
                    ${userIcon}
                `;
            } else {
                div.innerHTML = `
                    ${botIcon}
                    <div class="max-w-[85%] md:max-w-3xl ai-scholarly-card p-6 shadow-2xl border-r-4 border-r-gold-primary bg-gradient-to-br from-[#1F2F26] to-[#17231C] markdown-body">
                        <div class="flex items-center gap-2 mb-2 gold-primary font-bold text-[11px] uppercase tracking-wider opacity-90"><i class="fas fa-robot"></i> الجواب المالكي</div>
                        <div class="leading-relaxed text-emerald-50 text-[0.95rem]">${processedText}</div>
                        ${sourceHtml}
                    </div>
                `;
            }
            
            chatContainer.appendChild(div);
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        // Dark theme loader
        function showLoader() {
            const loaderDiv = document.createElement('div');
            loaderDiv.id = 'thinking-loader';
            loaderDiv.className = 'flex items-start gap-3 message-transition';
            loaderDiv.innerHTML = `
                <div class="w-10 h-10 bg-dark-elevated border border-gold-muted rounded-xl flex items-center justify-center shrink-0">
                    <i class="fas fa-robot text-gold-muted"></i>
                </div>
                <div class="ai-scholarly-card p-5 rounded-2xl flex items-center gap-3 bg-dark-elevated/90">
                    <i class="fas fa-spinner-third fa-spin text-gold-primary text-xl"></i>
                    <span class="text-emerald-200">البحث في المتون المالكية...</span>
                    <span class="flex gap-1 mr-2"><i class="fas fa-file-lines text-gold-dim"></i><i class="fas fa-database text-gold-dim"></i></span>
                </div>
            `;
            chatContainer.appendChild(loaderDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function removeLoader() {
            const loader = document.getElementById('thinking-loader');
            if (loader) loader.remove();
        }

        chatForm.onsubmit = async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            appendMessage(text, 'user');
            userInput.value = '';

            showLoader();

            try {
                const response = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: text })
                });
                
                if (!response.ok) throw new Error('Server Error');
                
                const data = await response.json();
                removeLoader();
                appendMessage(data.answer, 'bot', data.sources);
            } catch (err) {
                removeLoader();
                appendMessage("⚠️ عذرًا، حدث خطأ في الاتصال بالمكتبة المالكية.", 'bot', []);
                console.error(err);
            }
        };
    </script>
</body>
</html>
