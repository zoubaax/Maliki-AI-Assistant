version: '3.8'

services:
  # Database Service (Postgres with pgvector)
  db:
    image: ankane/pgvector:latest
    container_name: maliki_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-maliki_ai}
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mypassword}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Maliki AI App Service
  app:
    build: .
    container_name: maliki_app
    restart: always
    depends_on:
      - db
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DB_HOST: db

volumes:
  pgdata:
